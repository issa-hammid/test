<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Just In Takt</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
  <link rel="stylesheet" href="./global.css">
  <!-- <link rel="stylesheet" href="./styles.css"> -->
     <link rel="stylesheet" href="./dist/output.css">
  <!-- <link rel="stylesheet" href="./test.css"> -->
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'jit-red': '#EF4444',  
                        'jit-yellow': '#FFD600',  
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FBF9F4;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 214, 0, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 100% 100%, rgba(239, 68, 68, 0.03) 0%, transparent 30%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <div class="text-center mb-10">
        <h1 class="text-[36px] font-bold text-black tracking-tight">Just In Takt</h1>
        <p class="text-[#888] text-lg mt-1">Reset Your Password</p>
    </div>

    <div class="w-full max-w-[480px] bg-white rounded-[45px] p-10 md:p-14 shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-black/5">
        
        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 bg-jit-yellow rounded-full flex items-center justify-center shadow-sm">
                <i data-lucide="mail" class="w-7 h-7 text-black"></i>
            </div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-[30px] font-bold text-black mb-4">Forgot Password?</h2>
            <p class="text-[#777] text-[15px] leading-relaxed px-2">
                No worries! Enter your email address and we'll send you instructions to reset your password.
            </p>
        </div>

        <form class="space-y-6">
            <div class="space-y-3">
                <label class="block text-[14px] font-bold text-black ml-1">Email Address</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </span>
                    <input 
                        type="email" 
                        placeholder="admin@justintakt.com" 
                        class="w-full h-[58px] bg-white border border-gray-200 rounded-2xl pl-12 pr-4 outline-none focus:ring-2 focus:ring-jit-red/10 focus:border-jit-red/20 transition-all text-[15px]"
                    >
                </div>
            </div>

            <a href="/createnewpassword.html" class="w-full h-[60px] bg-[#EE463E] hover:bg-[#d93d36] text-white font-bold rounded-full flex items-center justify-center gap-3 transition-all shadow-lg shadow-jit-red/20 mt-8">
                <i data-lucide="mail" class="w-5 h-5"></i>
                Send Reset Link
            </a>
        </form>

        <div class="mt-8 text-center">
            <a href="/login.html" class="inline-flex items-center gap-2 text-[#666] font-semibold text-sm hover:text-black transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Login
            </a>
        </div>
    </div>

    <div class="w-full max-w-[480px] mt-6 bg-white/50 border border-black/5 rounded-[30px] p-8 text-center">
        <p class="text-[#666] text-sm mb-4">Need help accessing your account?</p>
        <button class="px-8 py-3 bg-white border border-gray-200 rounded-full font-bold text-sm shadow-sm hover:bg-gray-50 transition-all">
            Contact Support
        </button>
    </div>

    <div class="">
        <a href="/index.html" class="flex items-center gap-2 text-[#666] font-semibold text-sm hover:text-black transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Homepage
        </a>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
