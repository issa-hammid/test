<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind -->
  <link rel="stylesheet" href="./global.css">
  <!-- <link rel="stylesheet" href="./styles.css"> -->
  <link rel="stylesheet" href="./dist/output.css">


  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-[#FBF9F4] font-[Inter] flex justify-center px-4 py-6 lg:py-4">

  <div class="w-full max-w-[530px] mt-4">
    <div class="text-center">

      <h1 class="text-3xl md:text-4xl font-extrabold text-black">
        Just In Takt
      </h1>

      <p class="mt-3 text-[#777] text-lg">
        Create Your Account
      </p>

    </div>

    <!-- Login Card -->
    <div class="bg-white/60 border mt-5 border-black/10 rounded-[38px] p-6 lg:p-7 shadow-[0_15px_40px_rgba(0,0,0,0.10)]">

      <!-- Top Icon -->
      <div class="flex justify-center">
        <div class="w-16 h-16 rounded-full bg-[#FFD600] flex items-center justify-center">
          <i data-lucide="briefcase-business" class="w-8 h-8 text-black"></i>
        </div>
      </div>

      <!-- Title -->
      <div class="text-center mt-6">
        <h1 class="text-[25px] md:text-[30px] leading-none font-bold text-black">
          Welcome Back
        </h1>

        <p class="mt-3 text-[#777777] text-[16px] leading-relaxed">
          Sign in to access your admin dashboard
        </p>
      </div>

      <!-- Form -->
      <form class="mt-7 space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-[15px] font-semibold mb-3 text-black">
            Email Address
          </label>

          <div class="relative">
            <i
              data-lucide="mail"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"
            ></i>

            <input
              type="email"
              placeholder="admin@justintakt.com"
              class="w-full h-[58px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100 text-[15px]"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-[15px] font-semibold mb-3 text-black">
            Password
          </label>

          <div class="relative">
            <i
              data-lucide="lock"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"
            ></i>

            <input
              type="password"
              placeholder="Enter your password"
              class="w-full h-[58px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-12 outline-none focus:ring-2 focus:ring-red-100 text-[15px]"
            />

            <i
              data-lucide="eye"
              class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 cursor-pointer"
            ></i>
          </div>
        </div>

        <!-- Remember -->
        <div class="flex items-center justify-between text-[14px]">
          <label class="flex items-center gap-2 text-[#666]">
            <input type="checkbox" class="accent-[#EB433C]">
            Remember me
          </label>

          <a
            href="/forgotpassword.html"
            type="button"
            class="font-semibold text-[#EB433C]"
          >
            Forgot Password?
          </a>
        </div>

        <!-- Sign In -->
        <a
        href="/onboarding.html"
          class="w-full h-[58px] rounded-full bg-[#EB433C] text-white font-semibold text-[18px] flex items-center justify-center gap-3 hover:opacity-90 transition"
        >
          <i data-lucide="lock" class="w-5 h-5"></i>

          Sign In
        </a>

        <!-- Divider -->
        <div class="flex items-center gap-4">
          <div class="flex-1 h-px bg-black/10"></div>

          <span class="text-[#888] text-sm">
            or
          </span>

          <div class="flex-1 h-px bg-black/10"></div>
        </div>

        <!-- Google -->
        <button
          type="button"
          class="w-full h-[58px] rounded-full border border-black/10 bg-white/40 flex items-center justify-center gap-3 font-semibold text-black hover:bg-white transition"
        >
          <img
            src="./images/google.svg"
            class="w-5 h-5"
            alt=""
          />

          Sign in with Google
        </button>

        <!-- LinkedIn -->
        <button
          type="button"
          class="w-full h-[58px] rounded-full border border-black/10 bg-white/40 flex items-center justify-center gap-3 font-semibold text-black hover:bg-white transition"
        >
          <img
            src="./images/linkedin.svg"
            class="w-5 h-5"
            alt=""
          />

          Sign in with LinkedIn
        </button>

      </form>
    </div>

    <!-- SSL -->
    <div class="flex justify-center mt-8">
      <div class="border border-black/10 rounded-full px-6 py-4 bg-white/50 flex items-center gap-3 text-sm text-[#666]">

        <i
          data-lucide="shield-check"
          class="w-4 h-4 text-green-500"
        ></i>

        Secured with 256-bit SSL encryption
      </div>
    </div>

    <!-- Back -->
   <button 
   style="cursor: pointer;"
  onclick="window.location.href='index.html'"
  class="w-full mt-8 flex justify-center items-center gap-2 text-[#666] font-medium hover:opacity-70 transition"
>
  <i data-lucide="arrow-left" class="w-4 h-4"></i>
  Back to Homepage
</button>

   

  </div>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
