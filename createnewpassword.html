<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - Just In Takt</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
  <link rel="stylesheet" href="./global.css">
     <link rel="stylesheet" href="./dist/output.css">

  <!-- <link rel="stylesheet" href="./test.css"> -->
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'jit-red': '#EF4444',
                        'jit-yellow': '#FFD600',
                        'jit-bg-soft': '#FBF9F4',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FBF9F4;
            background-image: 
                radial-gradient(circle at 100% 50%, rgba(239, 68, 68, 0.04) 0%, transparent 25%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <div class="text-center mb-8">
        <h1 class="text-[36px] font-bold text-black ">Just In Takt</h1>
        <p class="text-[#888] text-lg">Create New Password</p>
    </div>

    <div class="w-full max-w-[480px] bg-white rounded-[50px] p-10 md:p-14 shadow-[0_20px_60px_rgba(0,0,0,0.06)] border border-black/5">
        
        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 bg-jit-yellow rounded-full flex items-center justify-center shadow-sm">
                <i data-lucide="shield" class="w-7 h-7 text-black"></i>
            </div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-[30px] font-bold text-black mb-3">Create New Password</h2>
            <p class="text-[#777] text-[15px] leading-relaxed">
                Your new password must be different from previously used passwords
            </p>
        </div>

        <form class="space-y-6">
            
            <div class="space-y-3">
                <label class="block text-[14px] font-bold text-black ml-1">New Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input 
                        type="password" 
                        placeholder="Create a strong password" 
                        class="w-full h-[58px] bg-white border border-gray-200 rounded-2xl pl-12 pr-12 outline-none focus:ring-2 focus:ring-jit-red/10 focus:border-jit-red/20 transition-all text-[15px]"
                    >
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </span>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-[14px] font-bold text-black ml-1">Confirm New Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input 
                        type="password" 
                        placeholder="Re-enter your password" 
                        class="w-full h-[58px] bg-white border border-gray-200 rounded-2xl pl-12 pr-12 outline-none focus:ring-2 focus:ring-jit-red/10 focus:border-jit-red/20 transition-all text-[15px]"
                    >
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </span>
                </div>
            </div>

            <div class="bg-[#FFFBEB] border border-[#FDE68A] rounded-2xl p-6 space-y-3">
                <p class="text-[14px] font-bold text-black mb-2">Password Requirements:</p>
                <ul class="space-y-2">
                    <li class="flex items-center gap-3 text-[13px] text-[#555]">
                        <i data-lucide="check-circle-2" class="w-4 h-4 text-gray-400"></i>
                        At least 8 characters
                    </li>
                    <li class="flex items-center gap-3 text-[13px] text-[#555]">
                        <i data-lucide="check-circle-2" class="w-4 h-4 text-gray-400"></i>
                        Uppercase and lowercase letters
                    </li>
                    <li class="flex items-center gap-3 text-[13px] text-[#555]">
                        <i data-lucide="check-circle-2" class="w-4 h-4 text-gray-400"></i>
                        At least one number
                    </li>
                    <li class="flex items-center gap-3 text-[13px] text-[#555]">
                        <i data-lucide="check-circle-2" class="w-4 h-4 text-gray-400"></i>
                        At least one special character
                    </li>
                </ul>
            </div>

            <a href="/login.html" class="w-full h-[60px] bg-[#EE463E] hover:bg-[#d93d36] text-white font-bold rounded-full flex items-center justify-center gap-3 transition-all shadow-lg shadow-jit-red/20 mt-8">
                <i data-lucide="lock" class="w-5 h-5"></i>
                Reset Password
            </a>
        </form>
    </div>

    <div class="mt-8">
        <a href="/login.html" class="flex items-center gap-2 text-[#666] font-semibold text-sm hover:text-black transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Login
        </a>
    </div>

    <script>
        // تفعيل الأيقونات
        lucide.createIcons();
    </script>
</body>
</html>
