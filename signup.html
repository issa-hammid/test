<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Create Account</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind -->
  <link rel="stylesheet" href="./global.css">
   <link rel="stylesheet" href="./dist/output.css">

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-[#FBF9F4] font-[Inter] px-4 py-5 lg:py-4">

  <div class="max-w-[620px] mx-auto min-h-screen flex flex-col justify-center">

    <!-- Header -->
    <div class="text-center">

      <h1 class="text-3xl md:text-4xl font-extrabold text-black">
        Just In Takt
      </h1>

      <p class="mt-3 text-[#777] text-[16px] md:text-lg">
        Create Your Account
      </p>

    </div>

    <!-- Steps -->
    <div class="flex items-center justify-center mt-8 md:mt-10 px-2">

      <!-- STEP 1 -->
      <div class="flex flex-col items-center shrink-0">

        <div
          id="step1Circle"
          class="w-11 h-11 rounded-full bg-[#EB433C] text-white flex items-center justify-center font-bold text-sm transition-all duration-300"
        >
          1
        </div>

        <span class="mt-3 text-sm text-[#666]">
          Personal
        </span>

      </div>

      <!-- LINE 1 -->
      <div
        id="line1"
        class="w-14 md:w-24 h-[2px] bg-black/10 mx-2 transition-all duration-300"
      ></div>

      <!-- STEP 2 -->
      <div class="flex flex-col items-center shrink-0">

        <div
          id="step2Circle"
          class="w-11 h-11 rounded-full border border-black/10 bg-white text-[#999] flex items-center justify-center font-bold text-sm transition-all duration-300"
        >
          2
        </div>

        <span class="mt-3 text-sm text-[#666]">
          Company
        </span>

      </div>

      <!-- LINE 2 -->
      <div
        id="line2"
        class="w-14 md:w-24 h-[2px] bg-black/10 mx-2 transition-all duration-300"
      ></div>

      <!-- STEP 3 -->
      <div class="flex flex-col items-center shrink-0">

        <div
          id="step3Circle"
          class="w-11 h-11 rounded-full border border-black/10 bg-white text-[#999] flex items-center justify-center font-bold text-sm transition-all duration-300"
        >
          3
        </div>

        <span class="mt-3 text-sm text-[#666]">
          Security
        </span>

      </div>

    </div>

    <!-- CARD -->
    <div
      class="mt-7 md:mt-8 bg-white/60 border border-black/10 rounded-[34px] p-6 md:p-7 shadow-[0_20px_50px_rgba(0,0,0,0.10)] backdrop-blur-xl transition-all duration-300"
    >

      <!-- Dynamic Content -->
      <div id="formContent"></div>

    </div>

    <!-- Footer -->
    <div class="text-center mt-6">

      <p class="text-[#666] text-sm">
        Already have an account?

        <a
          href="/login.html"
          class="text-[#EB433C] font-semibold"
        >
          Sign In
        </a>
      </p>

      <!-- BACK -->
      <button
        onclick="window.history.back()"
        class="mt-5 flex items-center justify-center gap-2 mx-auto text-[#666] font-medium hover:opacity-70 transition"
      >

        <i data-lucide="arrow-left" class="w-4 h-4"></i>

        Back to Homepage

      </button>

    </div>

  </div>

  <script>

    const formContent = document.getElementById("formContent");

    let currentStep = 1;

    // =========================
    // UPDATE STEPS
    // =========================
    function updateSteps() {

      const step1 = document.getElementById("step1Circle");
      const step2 = document.getElementById("step2Circle");
      const step3 = document.getElementById("step3Circle");

      const line1 = document.getElementById("line1");
      const line2 = document.getElementById("line2");

      // RESET
      step1.className =
        "w-11 h-11 rounded-full border border-black/10 bg-white text-[#999] flex items-center justify-center font-bold text-sm transition-all duration-300";

      step2.className =
        "w-11 h-11 rounded-full border border-black/10 bg-white text-[#999] flex items-center justify-center font-bold text-sm transition-all duration-300";

      step3.className =
        "w-11 h-11 rounded-full border border-black/10 bg-white text-[#999] flex items-center justify-center font-bold text-sm transition-all duration-300";

      step1.innerHTML = "1";
      step2.innerHTML = "2";
      step3.innerHTML = "3";

      line1.className =
        "w-14 md:w-24 h-[2px] bg-black/10 mx-2 transition-all duration-300";

      line2.className =
        "w-14 md:w-24 h-[2px] bg-black/10 mx-2 transition-all duration-300";

      // STEP 1 ACTIVE
      if (currentStep === 1) {

        step1.className =
          "w-11 h-11 rounded-full bg-[#EB433C] text-white flex items-center justify-center font-bold text-sm transition-all duration-300";
      }

      // STEP 2
      if (currentStep >= 2) {

        step1.className =
          "w-11 h-11 rounded-full bg-[#EB433C] text-white flex items-center justify-center transition-all duration-300";

        step1.innerHTML =
          `<i data-lucide="check" class="w-5 h-5"></i>`;

        line1.className =
          "w-14 md:w-24 h-[2px] bg-[#EB433C] mx-2 transition-all duration-300";

        step2.className =
          "w-11 h-11 rounded-full bg-[#EB433C] text-white flex items-center justify-center font-bold text-sm transition-all duration-300";
      }

      // STEP 3
      if (currentStep >= 3) {

        step2.className =
          "w-11 h-11 rounded-full bg-[#EB433C] text-white flex items-center justify-center transition-all duration-300";

        step2.innerHTML =
          `<i data-lucide="check" class="w-5 h-5"></i>`;

        line2.className =
          "w-14 md:w-24 h-[2px] bg-[#EB433C] mx-2 transition-all duration-300";

        step3.className =
          "w-11 h-11 rounded-full bg-[#EB433C] text-white flex items-center justify-center font-bold text-sm transition-all duration-300";
      }
    }

    // =========================
    // RENDER STEP
    // =========================
    function renderStep() {

      updateSteps();

      // =========================
      // STEP 1
      // =========================
      if (currentStep === 1) {

        formContent.innerHTML = `
          <div class="flex justify-center">
            <div class="w-14 h-14 rounded-full bg-[#FFD600] flex items-center justify-center">
              <i data-lucide="user" class="w-7 h-7 text-black"></i>
            </div>
          </div>

          <div class="text-center mt-5">
            <h2 class="text-[25px] md:text-[30px] leading-none font-bold text-black">
              Personal Information
            </h2>

            <p class="mt-3 text-[#777] text-[16px]">
              Let's start with your basic details
            </p>
          </div>

          <form class="mt-7 space-y-5">

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Full Name *
              </label>

              <div class="relative">

                <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="text"
                  placeholder="John Doe"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Email Address *
              </label>

              <div class="relative">

                <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="email"
                  placeholder="john@company.com"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Phone Number *
              </label>

              <div class="relative">

                <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="text"
                  placeholder="+1 (555) 000-0000"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <button
              type="button"
              onclick="nextStep()"
              class="w-full h-[56px] rounded-full bg-[#EB433C] text-white font-semibold text-base hover:opacity-90 transition mt-2"
            >
              Continue
            </button>

          </form>
        `;
      }

      // =========================
      // STEP 2
      // =========================
      else if (currentStep === 2) {

        formContent.innerHTML = `
          <div class="flex justify-center">
            <div class="w-14 h-14 rounded-full bg-[#FFD600] flex items-center justify-center">
              <i data-lucide="building-2" class="w-7 h-7 text-black"></i>
            </div>
          </div>

          <div class="text-center mt-5">
            <h2 class="text-[25px] md:text-[30px] leading-none font-bold text-black">
              Company Information
            </h2>

            <p class="mt-3 text-[#777] text-[16px]">
              Tell us more about your work
            </p>
          </div>

          <form class="mt-7 space-y-5">

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Company Name *
              </label>

              <div class="relative">

                <i data-lucide="building-2" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="text"
                  placeholder="Your Company"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Job Title *
              </label>

              <div class="relative">

                <i data-lucide="briefcase-business" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="text"
                  placeholder="Product Designer"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Country *
              </label>

              <div class="relative">

                <i data-lucide="map-pinned" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="text"
                  placeholder="United States"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <div class="flex gap-4 pt-2">

              <button
                type="button"
                onclick="prevStep()"
                class="w-full h-[56px] rounded-full bg-white border border-black/10 text-black font-semibold text-base hover:bg-gray-50 transition"
              >
                Back
              </button>

              <button
                type="button"
                onclick="nextStep()"
                class="w-full h-[56px] rounded-full bg-[#EB433C] text-white font-semibold text-base hover:opacity-90 transition"
              >
                Continue
              </button>

            </div>

          </form>
        `;
      }

      // =========================
      // STEP 3
      // =========================
      else if (currentStep === 3) {

        formContent.innerHTML = `
          <div class="flex justify-center">
            <div class="w-14 h-14 rounded-full bg-[#FFD600] flex items-center justify-center">
              <i data-lucide="shield-check" class="w-7 h-7 text-black"></i>
            </div>
          </div>

          <div class="text-center mt-5">
           <h2 class="text-[25px] md:text-[30px] leading-none font-bold text-black">
              Security Setup
            </h2>

            <p class="mt-3 text-[#777] text-[16px]">
              Create a secure password
            </p>
          </div>

          <form class="mt-7 space-y-5">

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Password *
              </label>

              <div class="relative">

                <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="password"
                  placeholder="Enter password"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <div>
              <label class="block text-[14px] font-semibold mb-3">
                Confirm Password *
              </label>

              <div class="relative">

                <i data-lucide="shield-check" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

                <input
                  type="password"
                  placeholder="Confirm password"
                  class="w-full h-[56px] rounded-2xl border border-black/10 bg-white/50 pl-12 pr-4 outline-none focus:ring-2 focus:ring-red-100"
                />

              </div>
            </div>

            <div class="pt-1 text-sm leading-relaxed text-[#666]">

              I agree to the

              <span class="text-[#EB433C] font-semibold cursor-pointer">
                Terms of Service
              </span>

              and

              <span class="text-[#EB433C] font-semibold cursor-pointer">
                Privacy Policy
              </span>

            </div>

            <div class="flex gap-4 pt-2">

              <button
                type="button"
                onclick="prevStep()"
                class="w-full h-[56px] rounded-full bg-white border border-black/10 text-black font-semibold text-base hover:bg-gray-50 transition"
              >
                Back
              </button>

              <a
                href="/verifyemail.html"
                class="w-full h-[56px] rounded-full bg-[#EB433C] text-white font-semibold text-base hover:opacity-90 transition flex items-center justify-center"
              >
                Create Account
              </a>

            </div>

          </form>
        `;
      }

      lucide.createIcons();
    }

    // NEXT
    function nextStep() {

      if (currentStep < 3) {

        currentStep++;

        renderStep();
      }
    }

    // PREV
    function prevStep() {

      if (currentStep > 1) {

        currentStep--;

        renderStep();
      }
    }

    // INIT
    renderStep();

  </script>

</body>
</html>
